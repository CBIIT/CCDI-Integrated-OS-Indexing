          with ga, apoc.coll.union(sample_diagnosis_file_filter, sample_diagnosis_file_filter_1) as sample_diagnosis_file_filter
          // combination 31
          optional match (sm2:sample)<-[:of_genetic_analysis]-(ga)
          optional MATCH (p:participant)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2)
          WHERE (cl: cell_line or cl: pdx)
          optional match (st:study)<--(cg:consent_group)<--(p)
          optional match (p)<--(dg:diagnosis)
          optional Match (sm1)<--(file)
          WHERE (file: clinical_measure_file or file: radiology_file or file: generic_file)
          with ga, sample_diagnosis_file_filter, sm1, sm2, file, dg
          with ga, sample_diagnosis_file_filter,
            apoc.coll.union(
              CASE WHEN collect(sm1) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm1, file: file, dg: dg}) ELSE [] END,
              CASE WHEN collect(sm2) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm2, file: file, dg: dg}) ELSE [] END
            ) as sample_diagnosis_file_filter_1
          with ga, apoc.coll.union(sample_diagnosis_file_filter, sample_diagnosis_file_filter_1) as sample_diagnosis_file_filter
          // combination 32
          optional match (sm2:sample)<-[:of_genetic_analysis]-(ga)
          optional MATCH (p:participant)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2)
          WHERE (cl: cell_line or cl: pdx)
          optional match (st:study)<--(cg:consent_group)<--(p)
          optional match (sm1)<--(dg:diagnosis)
          optional Match (sm1)<--(file)
          WHERE (file: clinical_measure_file or file: radiology_file or file: generic_file)
          with ga, sample_diagnosis_file_filter, sm1, sm2, file, dg
          with ga, sample_diagnosis_file_filter,
            apoc.coll.union(
              CASE WHEN collect(sm1) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm1, file: file, dg: dg}) ELSE [] END,
              CASE WHEN collect(sm2) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm2, file: file, dg: dg}) ELSE [] END
            ) as sample_diagnosis_file_filter_1
          with ga, apoc.coll.union(sample_diagnosis_file_filter, sample_diagnosis_file_filter_1) as sample_diagnosis_file_filter
          // combination 33
          optional match (sm2:sample)<-[:of_genetic_analysis]-(ga)
          optional MATCH (p:participant)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2)
          WHERE (cl: cell_line or cl: pdx)
          optional match (st:study)<--(cg:consent_group)<--(p)
          optional match (sm2)<--(dg:diagnosis)
          optional Match (sm1)<--(file)
          WHERE (file: clinical_measure_file or file: radiology_file or file: generic_file)
          with ga, sample_diagnosis_file_filter, sm1, sm2, file, dg
          with ga, sample_diagnosis_file_filter,
            apoc.coll.union(
              CASE WHEN collect(sm1) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm1, file: file, dg: dg}) ELSE [] END,
              CASE WHEN collect(sm2) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm2, file: file, dg: dg}) ELSE [] END
            ) as sample_diagnosis_file_filter_1
          with ga, apoc.coll.union(sample_diagnosis_file_filter, sample_diagnosis_file_filter_1) as sample_diagnosis_file_filter
          // combination 34
          optional match (sm2:sample)<-[:of_genetic_analysis]-(ga)
          optional MATCH (p:participant)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2)
          WHERE (cl: cell_line or cl: pdx)
          optional match (st:study)<--(cg:consent_group)<--(p)
          optional match (p)<--(dg:diagnosis)
          optional Match (sm2)<--(file)
          WHERE (file: clinical_measure_file or file: radiology_file or file: generic_file)
          with ga, sample_diagnosis_file_filter, sm1, sm2, file, dg
          with ga, sample_diagnosis_file_filter,
            apoc.coll.union(
              CASE WHEN collect(sm1) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm1, file: file, dg: dg}) ELSE [] END,
              CASE WHEN collect(sm2) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm2, file: file, dg: dg}) ELSE [] END
            ) as sample_diagnosis_file_filter_1
          with ga, apoc.coll.union(sample_diagnosis_file_filter, sample_diagnosis_file_filter_1) as sample_diagnosis_file_filter
          // combination 35
          optional match (sm2:sample)<-[:of_genetic_analysis]-(ga)
          optional MATCH (p:participant)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2)
          WHERE (cl: cell_line or cl: pdx)
          optional match (st:study)<--(cg:consent_group)<--(p)
          optional match (sm1)<--(dg:diagnosis)
          optional Match (sm2)<--(file)
          WHERE (file: clinical_measure_file or file: radiology_file or file: generic_file)
          with ga, sample_diagnosis_file_filter, sm1, sm2, file, dg
          with ga, sample_diagnosis_file_filter,
            apoc.coll.union(
              CASE WHEN collect(sm1) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm1, file: file, dg: dg}) ELSE [] END,
              CASE WHEN collect(sm2) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm2, file: file, dg: dg}) ELSE [] END
            ) as sample_diagnosis_file_filter_1
          with ga, apoc.coll.union(sample_diagnosis_file_filter, sample_diagnosis_file_filter_1) as sample_diagnosis_file_filter
          // combination 36
          optional match (sm2:sample)<-[:of_genetic_analysis]-(ga)
          optional MATCH (p:participant)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2)
          WHERE (cl: cell_line or cl: pdx)
          optional match (st:study)<--(cg:consent_group)<--(p)
          optional match (sm2)<--(dg:diagnosis)
          optional Match (sm2)<--(file)
          WHERE (file: clinical_measure_file or file: radiology_file or file: generic_file)
          with ga, sample_diagnosis_file_filter, sm1, sm2, file, dg
          with ga, sample_diagnosis_file_filter,
            apoc.coll.union(
              CASE WHEN collect(sm1) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm1, file: file, dg: dg}) ELSE [] END,
              CASE WHEN collect(sm2) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm2, file: file, dg: dg}) ELSE [] END
            ) as sample_diagnosis_file_filter_1
          with ga, apoc.coll.union(sample_diagnosis_file_filter, sample_diagnosis_file_filter_1) as sample_diagnosis_file_filter
          with ga, CASE WHEN size(sample_diagnosis_file_filter) > 0 THEN sample_diagnosis_file_filter ELSE [null] END as sample_diagnosis_file_filter
          unwind sample_diagnosis_file_filter as row
          with ga, row
          with ga, collect(distinct {
            // Sample facets
            sample_anatomic_site: case when row.sm is not null then apoc.text.split(row.sm.anatomic_site, ';') else null end,
            participant_age_at_collection: case when row.sm is not null then row.sm.participant_age_at_collection else null end,
            sample_tumor_status: case when row.sm is not null then row.sm.sample_tumor_status else null end,
            tumor_classification: case when row.sm is not null then row.sm.tumor_classification else null end,
            // Diagnosis facets
            age_at_diagnosis: case when row.dg is not null then row.dg.age_at_diagnosis else null end,
            diagnosis_anatomic_site: case when row.dg is not null then apoc.text.split(row.dg.anatomic_site, ';') else null end,
            disease_phase: case when row.dg is not null then row.dg.disease_phase else null end,
            diagnosis_classification_system: case when row.dg is not null then row.dg.diagnosis_classification_system else null end,
            diagnosis_category: case when row.dg is not null then apoc.text.split(row.dg.diagnosis_category, ';') else null end,
            diagnosis_basis: case when row.dg is not null then row.dg.diagnosis_basis else null end,
            diagnosis: case when row.dg is not null then row.dg.diagnosis else null end,
            // File facets
            data_category: case when row.file is not null then apoc.text.split(row.file.data_category, ';') else null end,
            file_type: case when row.file is not null then row.file.file_type else null end,
            file_mapping_level: case when row.file is not null then row.file.file_mapping_level else null end,
            library_selection: case when row.file is not null and size(labels(row.file)) > 0 and labels(row.file)[0] = 'sequencing_file' then row.file.library_selection else null end,
            library_source_material: case when row.file is not null and size(labels(row.file)) > 0 and labels(row.file)[0] = 'sequencing_file' then row.file.library_source_material else null end,
            library_source_molecule: case when row.file is not null and size(labels(row.file)) > 0 and labels(row.file)[0] = 'sequencing_file' then row.file.library_source_molecule else null end,
            library_strategy: case when row.file is not null and size(labels(row.file)) > 0 and labels(row.file)[0] = 'sequencing_file' then row.file.library_strategy else null end
          }) as sample_diagnosis_file_filter
          optional match (p:participant)<-[*..3]-(ga)
          OPTIONAL MATCH (p)<-[:of_survival]-(su:survival)
          OPTIONAL MATCH (p)<-[:of_treatment]-(tr:treatment)
          OPTIONAL MATCH (p)<-[:of_treatment_response]-(tresp:treatment_response)
          with ga, p, sample_diagnosis_file_filter, CASE WHEN su IS NOT NULL THEN COLLECT(DISTINCT {last_known_survival_status: su.last_known_survival_status, 
              cause_of_death: su.cause_of_death, 
              first_event: su.first_event,
              age_at_last_known_survival_status: su.age_at_last_known_survival_status} ) ELSE [] END AS survival_filters,
          CASE WHEN tr IS NOT NULL THEN COLLECT(DISTINCT{
              treatment_type: apoc.text.split(tr.treatment_type, ';'),
              treatment_agent: apoc.text.split(tr.treatment_agent, ';'),
              age_at_treatment_start: tr.age_at_treatment_start,
              age_at_treatment_end: tr.age_at_treatment_end}) ELSE [] END AS treatment_filters,
          CASE WHEN tresp IS NOT NULL THEN COLLECT(DISTINCT{
            age_at_response: tresp.age_at_response,
            response: tresp.response,
            response_category: tresp.response_category,
            response_system: tresp.response_system}) ELSE [] END AS treatment_response_filters
          optional match (st:study)<-[*..6]-(ga)
          with ga, p, st, survival_filters, treatment_filters, treatment_response_filters, sample_diagnosis_file_filter, 
               CASE WHEN ga.gene_symbol STARTS WITH '[' AND ga.gene_symbol ENDS WITH ']' THEN
                    [x IN split(replace(substring(ga.gene_symbol, 1, size(ga.gene_symbol)-2), "'", ""), ",") | 
                      CASE 
                        WHEN apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') = '' 
                        THEN 'Not Reported' 
                        ELSE apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') 
                      END
                    ]
                  ELSE
                    [CASE 
                      WHEN apoc.text.replace(trim(ga.gene_symbol), '^[^A-Za-z0-9]+', '') = '' 
                      THEN 'Not Reported' 
                      ELSE apoc.text.replace(trim(ga.gene_symbol), '^[^A-Za-z0-9]+', '') 
                    END]
                END AS gene_symbol_arr
          RETURN DISTINCT
            ga.id as id,
            ga.genetic_analysis_id as genetic_analysis_id,
            p.id as pid,
            p.participant_id as participant_id,
            apoc.text.split(p.race, ';') as race,
            p.sex_at_birth as sex_at_birth,
            st.study_id as study_id,
            st.dbgap_accession as dbgap_accession,
            st.study_status AS study_status,
            st.study_acronym as study_acronym,
            st.study_name as study_name,
            // Genetic Analysis fields
            ga.alteration AS alteration,
            ga.cytoband AS cytoband,
            apoc.coll.toSet(gene_symbol_arr) AS gene_symbol,
            apoc.text.join(apoc.coll.toSet(gene_symbol_arr), ';') AS gene_symbol_str,
            ga.genomic_source_category AS genomic_source_category,
            ga.hgvs_coding AS hgvs_coding,
            ga.hgvs_genome AS hgvs_genome,
            ga.hgvs_protein AS hgvs_protein,
            ga.reported_significance AS reported_significance,
            ga.reported_significance_system AS reported_significance_system,
            ga.status AS status,
            ga.test AS test,
            ga.alteration_effect AS alteration_effect,
            ga.alteration_type AS alteration_type,
            ga.chromosome AS chromosome,
            ga.exon AS exon,
            ga.fusion_partner_exon AS fusion_partner_exon,
            ga.fusion_partner_gene AS fusion_partner_gene,
            ga.reference_genome AS reference_genome,
            survival_filters as survival_filters, 
            treatment_filters as treatment_filters,
            treatment_response_filters as treatment_response_filters,
            sample_diagnosis_file_filter AS sample_diagnosis_file_filters
        page_size: 100

  - index_name: studies_table
    type: neo4j
    mapping:
      id: # a.k.a study primary key
        type: keyword
      study_id:
        type: keyword
      grant_id:
        type: keyword
      pubmed_ids:
        type: keyword
      dbgap_accession:
        type: keyword
      study_status:
        type: keyword
      study_name:
        type: keyword
      study_description:
        type: keyword
      study_acronym:
        type: keyword
      PIs:
        type: keyword
      num_of_participants:
        type: integer
      num_of_samples:
        type: integer
      num_of_files:
        type: integer
      diagnosis_cancer:
        type: text
        fields:
          keyword:
            type: keyword
      diagnosis_anatomic_site:
        type: text
        fields:
          keyword:
            type: keyword
      file_types:
        type: text
        fields:
          keyword:
            type: keyword
      files:
        type: text
        fields:
          keyword:
            type: keyword
      # Data availability fields for Hub Studies table
      num_of_study_files:
        type: integer
      num_of_participant_files:
        type: integer
      num_of_sample_files:
        type: integer
      num_of_publications:
        type: integer
    # Cypher query will be used to retrieve data from Neo4j, and index into Elasticsearch
    cypher_queries:
      - query: |
          MATCH (st:study)<-[:of_consent_group]-(cg:consent_group)<-[:of_participant]-(p:participant)
          with st, count(p) as num_p
          MATCH (st:study)<-[*..6]-(dg:diagnosis)
          with st, num_p, count(dg) as num_diag
          MATCH (st:study)<-[*..6]-(dg:diagnosis)
          with st, num_p, num_diag, dg.diagnosis as dg_cancers, count(dg.diagnosis) as num_cancers
          ORDER BY num_cancers desc
          with st, num_p, num_diag, collect(dg_cancers + ' (' + toString(num_cancers) + ')') as cancers
          MATCH (st)<-[*..6]-(diag:diagnosis)
          with st, num_p, num_diag, cancers, apoc.text.split(diag.anatomic_site, ';') as dg_sites
          unwind dg_sites as dg_site
          with st, num_p, num_diag, cancers, dg_site
          with st, num_p, num_diag, cancers, dg_site, count(dg_site) as num_sites
          ORDER BY num_sites desc
          with st, num_p, num_diag, cancers, collect(dg_site + ' (' + toString(num_sites) + ')') as sites
          MATCH (st)<-[*..6]-(fl)
          WHERE (fl:clinical_measure_file or fl: generic_file OR fl: sequencing_file OR fl:pathology_file OR fl:radiology_file OR fl:methylation_array_file OR fl:cytogenomic_file)
          with st, num_p, num_diag, cancers, sites, fl.file_type as ft, count(distinct fl.dcf_indexd_guid) as num_ft, collect(distinct fl.dcf_indexd_guid) as ft_guids
          ORDER BY num_ft desc
          with st, num_p, num_diag, cancers, sites, collect(ft + ' (' + toString(num_ft) + ')') as file_types, apoc.coll.toSet(apoc.coll.flatten(collect(ft_guids))) as all_guids
          with st, num_p, num_diag, cancers, sites, file_types, size(all_guids) as num_files
          OPTIONAL MATCH (st)<-[*..2]-(pcp)<-[:of_sample]-(sm1:sample)
          WHERE (pcp:participant or pcp:cell_line or pcp:pdx)
          WITH st, num_p, num_diag, cancers, sites, file_types, num_files, count(distinct sm1.sample_id) as num_samples_1
          OPTIONAL MATCH (st)<-[:of_consent_group]-(cg:consent_group)<-[:of_participant]-(participant)<-[:of_sample]-(sm1:sample)<--(cp)<--(sm2:sample)
          WHERE (cp:cell_line or cp:pdx)
          WITH st, num_p, num_diag, cancers, sites, file_types, num_files, num_samples_1, count(distinct sm2.sample_id) as num_samples_2
          WITH st, num_p, num_diag, cancers, sites, file_types, num_files, num_samples_1 + num_samples_2 as num_samples
          MATCH (st)<-[*..6]-(file)
          WHERE (file:clinical_measure_file or file: generic_file OR file: sequencing_file OR file:pathology_file OR file:radiology_file OR file:methylation_array_file OR file:cytogenomic_file)
          WITH st, num_p, num_diag, cancers, sites, file_types, num_files, num_samples,
               file.dcf_indexd_guid as file_id,
               file.file_mapping_level as file_level
          WITH st, num_p, num_diag, cancers, sites, file_types, num_files, num_samples,
               COLLECT(DISTINCT file_id) as all_file_ids,
               COUNT(DISTINCT CASE WHEN file_level = 'Study' THEN file_id END) as num_study_files,
               COUNT(DISTINCT CASE WHEN file_level = 'Participant' THEN file_id END) as num_participant_files,
               COUNT(DISTINCT CASE WHEN file_level = 'Sample' THEN file_id END) as num_sample_files
          OPTIONAL MATCH (st)<-[:of_publication]-(pub:publication)
          WITH st, num_p, num_diag, cancers, sites, file_types, num_files, num_samples, all_file_ids, num_study_files, num_participant_files, num_sample_files, COLLECT(DISTINCT pub.pubmed_id) as pub_ids
          WITH st, num_p, num_diag, cancers, sites, file_types, num_files, num_samples, all_file_ids, num_study_files, num_participant_files, num_sample_files, pub_ids, SIZE([p IN pub_ids WHERE p IS NOT NULL]) as num_publications
          OPTIONAL MATCH (st)<-[:of_study_personnel]-(stp:study_personnel)
          WHERE stp.personnel_type = 'PI'
          OPTIONAL MATCH (st)<-[:of_study_funding]-(stf:study_funding)
          WITH st, num_p, num_diag, cancers, sites, file_types, num_files, num_samples, all_file_ids, num_study_files, num_participant_files, num_sample_files, pub_ids, num_publications, stf, stp
          RETURN DISTINCT
            st.id as id,
            st.study_id as study_id,
            apoc.text.join(COLLECT(DISTINCT stf.grant_id), ';') as grant_id,
            apoc.text.join([p IN pub_ids WHERE p IS NOT NULL], ';') as pubmed_ids,
            st.dbgap_accession as dbgap_accession,
            st.study_status AS study_status,
            st.study_name as study_name,
            st.study_description as study_description,
            st.study_acronym as study_acronym,
            apoc.text.join(COLLECT(DISTINCT stp.personnel_name), ';') as PIs,
            st.study_id as study_id_gs,
            st.study_name as study_name_gs,
            st.study_status as study_status_gs,
            num_p as num_of_participants,
            num_diag as num_of_diagnoses,
            cancers as diagnosis_cancer,
            sites as diagnosis_anatomic_site,
            file_types as file_types,
            num_samples as num_of_samples,
            num_files as num_of_files,
            all_file_ids as files,
            num_study_files as num_of_study_files,
            num_participant_files as num_of_participant_files,
            num_sample_files as num_of_sample_files,
            num_publications as num_of_publications
  
  - index_name: samples_table
    type: neo4j
    mapping:
      id: # a.k.a sample primary key
        type: keyword
      sample_id:
        type: keyword
      # Participant fields
      pid: # a.k.a participant_pk
        type: keyword
      participant_id:
        type: keyword
      race:
        type: keyword
      sex_at_birth:
        type: keyword
      # Study fields
      study_id:
        type: keyword
      dbgap_accession:
        type: keyword
      study_status:
        type: keyword
      study_acronym:
        type: keyword
      study_name:
        type: keyword
      # Sample fields
      sample_anatomic_site:
        type: keyword
      sample_anatomic_site_str:
        type: keyword     
      participant_age_at_collection:
        type: integer
      sample_tumor_status:
        type: keyword
      tumor_classification:
        type: keyword
      # Diagnosis filters
      diagnosis_filters:
        type: nested
        properties:
          age_at_diagnosis:
            type: integer
          diagnosis_anatomic_site:
            type: keyword
          disease_phase:
            type: keyword
          diagnosis_classification_system:
            type: keyword
          diagnosis_basis:
            type: keyword   
          diagnosis:
            type: keyword
          diagnosis_category:
            type: keyword
      # Genetic Analysis filters
      genetic_analysis_filters:
        type: nested
        properties:
          reported_significance:
            type: keyword
          reported_significance_system:
            type: keyword
          gene_symbol:
            type: keyword
          alteration:
            type: keyword
          fusion_partner_gene:
            type: keyword
          alteration_type:
            type: keyword
          status:
            type: keyword
      # File filters
      file_filters:
        type: nested
        properties:
          data_category:
            type: keyword
          file_type:
            type: keyword
          file_mapping_level:
            type: keyword            
          library_selection:
            type: keyword
          library_source_material:
            type: keyword
          library_source_molecule:
            type: keyword
          library_strategy:
            type: keyword
      # Survival filters
      survival_filters:
        type: nested
        properties:
          last_known_survival_status:
            type: keyword
          age_at_last_known_survival_status:
            type: integer
          cause_of_death:
            type: keyword
          first_event:
            type: keyword
      # Treatment filters
      treatment_filters:
        type: nested
        properties:
          treatment_type:
            type: keyword
          treatment_agent:
            type: keyword
          age_at_treatment_start:
            type: integer
          age_at_treatment_end:
            type: integer
      # Treatment response filters
      treatment_response_filters:
        type: nested
        properties:
          age_at_response:
            type: integer
          response:
            type: keyword
          response_category:
            type: keyword
          response_system:
            type: keyword
      file_count:
        type: integer
      direct_file_count:
        type: integer
      files:
        type: text
        fields:
          keyword:
            type: keyword
    # Cypher query will be used to retrieve data from Neo4j, and index into Elasticsearch
    cypher_queries:
      - query: |
          MATCH (sm:sample)
          WITH sm, {
            id: sm.id,
            sample_id: sm.sample_id,
            sample_anatomic_site: apoc.text.split(sm.anatomic_site, ';'),
            sample_anatomic_site_str: sm.anatomic_site,
            participant_age_at_collection: sm.participant_age_at_collection,
            sample_tumor_status: sm.sample_tumor_status,
            tumor_classification: sm.tumor_classification
          } AS opensearch_data
          MATCH (sm)-[*..3]->(p:participant)
          WITH sm, apoc.map.merge(opensearch_data, {
            pid: p.id,
            participant_id: p.participant_id,
            race: apoc.text.split(p.race, ';'),
            sex_at_birth: p.sex_at_birth
          }) AS opensearch_data
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (sm)-[*..3]->(:participant)<--(dg:diagnosis)
          WITH sm, opensearch_data, CASE WHEN dg IS NOT NULL THEN COLLECT(DISTINCT {
            age_at_diagnosis: dg.age_at_diagnosis,
            diagnosis_anatomic_site: apoc.text.split(dg.anatomic_site, ';'),
            disease_phase: dg.disease_phase,
            diagnosis_classification_system: dg.diagnosis_classification_system,
            diagnosis_category: apoc.text.split(dg.diagnosis_category, ';'),
            diagnosis_basis: dg.diagnosis_basis,
            tumor_grade_source: dg.tumor_grade_source,
            tumor_stage_source: dg.tumor_stage_source,
            diagnosis: dg.diagnosis
          }) ELSE [] END AS diagnosis_filter
          OPTIONAL MATCH (sm)<-[*..3]-(dg:diagnosis)
          WITH sm, apoc.map.merge(opensearch_data, {
            diagnosis_filters: apoc.coll.union(diagnosis_filter, CASE WHEN dg IS NOT NULL THEN COLLECT(DISTINCT{
              age_at_diagnosis: dg.age_at_diagnosis,
              diagnosis_anatomic_site: apoc.text.split(dg.anatomic_site, ';'),
              disease_phase: dg.disease_phase,
              diagnosis_classification_system: dg.diagnosis_classification_system,
              diagnosis_category: apoc.text.split(dg.diagnosis_category, ';'),
              diagnosis_basis: dg.diagnosis_basis,
              tumor_grade_source: dg.tumor_grade_source,
              tumor_stage_source: dg.tumor_stage_source,
              diagnosis: dg.diagnosis
            }) ELSE [] END)
          }) AS opensearch_data
          OPTIONAL MATCH (sm)-[*..3]->(:participant)<--(ga:genetic_analysis)
          WITH sm, opensearch_data, CASE WHEN ga IS NOT NULL THEN COLLECT(DISTINCT {
            reported_significance: ga.reported_significance,
            reported_significance_system: ga.reported_significance_system,
            gene_symbol: case when ga is not null then apoc.coll.toSet(CASE
                                  WHEN ga.gene_symbol STARTS WITH '[' AND ga.gene_symbol ENDS WITH ']' THEN
                                    [x IN split(replace(substring(ga.gene_symbol, 1, size(ga.gene_symbol)-2), "'", ""), ",") | 
                                      CASE 
                                        WHEN apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') = '' 
                                        THEN 'Not Reported' 
                                        ELSE apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') 
                                      END
                                    ]
                                  ELSE
                                    [CASE 
                                      WHEN apoc.text.replace(trim(ga.gene_symbol), '^[^A-Za-z0-9]+', '') = '' 
                                      THEN 'Not Reported' 
                                      ELSE apoc.text.replace(trim(ga.gene_symbol), '^[^A-Za-z0-9]+', '') 
                                    END]
                                END) else null end,
            alteration: ga.alteration,
            fusion_partner_gene: ga.fusion_partner_gene,
            alteration_type: ga.alteration_type,
            status: ga.status
          }) ELSE [] END AS genetic_analysis_filter
          OPTIONAL MATCH (sm)<-[*..3]-(ga:genetic_analysis)
          WITH sm, apoc.map.merge(opensearch_data, {
            genetic_analysis_filters: apoc.coll.union(genetic_analysis_filter, CASE WHEN ga IS NOT NULL THEN COLLECT(DISTINCT{
              reported_significance: ga.reported_significance,
              reported_significance_system: ga.reported_significance_system,
              gene_symbol: case when ga is not null then apoc.coll.toSet(CASE
                                  WHEN ga.gene_symbol STARTS WITH '[' AND ga.gene_symbol ENDS WITH ']' THEN
                                    [x IN split(replace(substring(ga.gene_symbol, 1, size(ga.gene_symbol)-2), "'", ""), ",") | 
                                      CASE 
                                        WHEN apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') = '' 
                                        THEN 'Not Reported' 
                                        ELSE apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') 
                                      END
                                    ]
                                  ELSE
                                    [CASE 
                                      WHEN apoc.text.replace(trim(ga.gene_symbol), '^[^A-Za-z0-9]+', '') = '' 
                                      THEN 'Not Reported' 
                                      ELSE apoc.text.replace(trim(ga.gene_symbol), '^[^A-Za-z0-9]+', '') 
                                    END]
                                END) else null end,
              alteration: ga.alteration,
              fusion_partner_gene: ga.fusion_partner_gene,
              alteration_type: ga.alteration_type,
              status: ga.status
            }) ELSE [] END)
          }) AS opensearch_data
          OPTIONAL MATCH (st:study)<-[*..5]-(sm)
          optional match (st)<--(file)
          where (file: clinical_measure_file or file: generic_file)
          WITH sm, opensearch_data, CASE WHEN file IS NOT NULL THEN COLLECT(DISTINCT {
            data_category: apoc.text.split(file.data_category, ';'),
            file_type: file.file_type,
            file_mapping_level: file.file_mapping_level,
            library_selection: null,
            library_source_material: null,
            library_source_molecule: null,
            library_strategy: null
          }) ELSE [] END AS file_filter
          optional match (sm)-[*..3]->(p:participant)
          optional match (p)<--(file)
          where (file: clinical_measure_file or file: generic_file or file: radiology_file)
          WITH sm, opensearch_data, apoc.coll.union(file_filter, CASE WHEN file IS NOT NULL THEN COLLECT(DISTINCT {
            data_category: apoc.text.split(file.data_category, ';'),
            file_type: file.file_type,
            file_mapping_level: file.file_mapping_level,
            library_selection: null,
            library_source_material: null,
            library_source_molecule: null,
            library_strategy: null
          }) ELSE [] END) AS file_filter
          OPTIONAL MATCH (sm)<-[*..3]-(file:sequencing_file)
          WITH sm, opensearch_data, apoc.coll.union(file_filter, CASE WHEN file IS NOT NULL THEN COLLECT(DISTINCT {
            data_category: apoc.text.split(file.data_category, ';'),
            file_type: file.file_type,
            file_mapping_level: file.file_mapping_level,
            library_selection: file.library_selection,
            library_source_material: file.library_source_material,
            library_source_molecule: file.library_source_molecule,
            library_strategy: file.library_strategy
          }) ELSE [] END) AS file_filter,
          COLLECT(DISTINCT file.dcf_indexd_guid) AS files
          OPTIONAL MATCH (sm)<-[*..3]-(file:generic_file)
          WITH sm, opensearch_data, apoc.coll.union(file_filter, CASE WHEN file IS NOT NULL THEN COLLECT(DISTINCT {
            data_category: apoc.text.split(file.data_category, ';'),
            file_type: file.file_type,
            file_mapping_level: file.file_mapping_level,
            library_selection: null,
            library_source_material: null,
            library_source_molecule: null,
            library_strategy: null
          }) ELSE [] END) AS file_filter,
          apoc.coll.union(files, COLLECT(DISTINCT file.dcf_indexd_guid)) AS files
          OPTIONAL MATCH (sm)<-[*..3]-(file:pathology_file)
          WITH sm, opensearch_data, apoc.coll.union(file_filter, CASE WHEN file IS NOT NULL THEN COLLECT(DISTINCT {
            data_category: apoc.text.split(file.data_category, ';'),
            file_type: file.file_type,
            file_mapping_level: file.file_mapping_level,
            library_selection: null,
            library_source_material: null,
            library_source_molecule: null,
            library_strategy: null
          }) ELSE [] END) AS file_filter,
          apoc.coll.union(files, COLLECT(DISTINCT file.dcf_indexd_guid)) AS files
          OPTIONAL MATCH (sm)<-[*..3]-(file:cytogenomic_file)
          WITH sm, opensearch_data, apoc.coll.union(file_filter, CASE WHEN file IS NOT NULL THEN COLLECT(DISTINCT {
            data_category: apoc.text.split(file.data_category, ';'),
            file_type: file.file_type,
            file_mapping_level: file.file_mapping_level,
            library_selection: null,
            library_source_material: null,
            library_source_molecule: null,
            library_strategy: null
          }) ELSE [] END) AS file_filter,
          apoc.coll.union(files, COLLECT(DISTINCT file.dcf_indexd_guid)) AS files
          OPTIONAL MATCH (sm)<-[*..3]-(file:methylation_array_file)
          WITH sm, opensearch_data, apoc.coll.union(file_filter, CASE WHEN file IS NOT NULL THEN COLLECT(DISTINCT {
            data_category: apoc.text.split(file.data_category, ';'),
            file_type: file.file_type,
            file_mapping_level: file.file_mapping_level,
            library_selection: null,
            library_source_material: null,
            library_source_molecule: null,
            library_strategy: null
          }) ELSE [] END) AS file_filter,
          apoc.coll.union(files, COLLECT(DISTINCT file.dcf_indexd_guid)) AS files
          WITH sm, apoc.map.merge(opensearch_data, {
            file_filters: file_filter,
            files: files,
            file_count: SIZE(files)
          }) AS opensearch_data
          MATCH (sm)-[*..3]->(:participant)-[:of_participant]->(cg:consent_group)-[:of_consent_group]->(st:study)
          WITH sm, apoc.map.merge(opensearch_data, {
            study_id: st.study_id,
            dbgap_accession: st.dbgap_accession,
            study_status: st.study_status,
            study_acronym: st.study_acronym,
            study_name: st.study_name
          }) AS opensearch_data
          OPTIONAL MATCH (sm)<--(direct_file)
          where (direct_file: sequencing_file or direct_file: generic_file or direct_file: pathology_file or direct_file: methylation_array_file or direct_file: cytogenomic_file)
          WITH sm, apoc.map.merge(opensearch_data, {
            direct_file_count: COUNT(DISTINCT direct_file.dcf_indexd_guid)
          }) AS opensearch_data
          OPTIONAL MATCH (sm)-[*..3]->(:participant)<-[:of_survival]-(su:survival)
          WITH sm, opensearch_data, CASE WHEN su IS NOT NULL THEN COLLECT(DISTINCT {last_known_survival_status: su.last_known_survival_status, 
              cause_of_death: su.cause_of_death, 
              first_event: su.first_event,
              age_at_last_known_survival_status: su.age_at_last_known_survival_status} ) ELSE [] END AS survival_filters
          WITH sm, apoc.map.merge(opensearch_data, {
            survival_filters: survival_filters
          }) AS opensearch_data
          OPTIONAL MATCH (sm)-[*..3]->(:participant)<-[:of_treatment]-(tr:treatment)
          WITH sm, opensearch_data, CASE WHEN tr IS NOT NULL THEN COLLECT(DISTINCT{
              treatment_type: apoc.text.split(tr.treatment_type, ';'),
              treatment_agent: apoc.text.split(tr.treatment_agent, ';'),
              age_at_treatment_start: tr.age_at_treatment_start,
              age_at_treatment_end: tr.age_at_treatment_end}) ELSE [] END AS treatment_filters
          WITH sm, apoc.map.merge(opensearch_data, {
            treatment_filters: treatment_filters
          }) AS opensearch_data
          OPTIONAL MATCH (sm)-[*..3]->(:participant)<-[:of_treatment_response]-(tresp:treatment_response)
          WITH sm, opensearch_data, CASE WHEN tresp IS NOT NULL THEN COLLECT(DISTINCT{
            age_at_response: tresp.age_at_response,
            response: tresp.response,
            response_category: tresp.response_category,
            response_system: tresp.response_system}) ELSE [] END AS treatment_response_filters
          WITH sm, apoc.map.merge(opensearch_data, {
            treatment_response_filters: treatment_response_filters
          }) AS opensearch_data
          return opensearch_data
        page_size: 100
      - query: |
          MATCH (sm:sample)
          MATCH (st:study)<-[:of_cell_line|of_pdx]-(cl)<--(sm)
          Where (cl:cell_line or cl:pdx)
          optional match (st)<--(file)
          where (file: clinical_measure_file or file: generic_file)
          with sm, CASE WHEN file IS NOT NULL THEN COLLECT(DISTINCT {
            data_category: apoc.text.split(file.data_category, ';'),
            file_type: file.file_type,
            file_mapping_level: file.file_mapping_level,
            library_selection: null,
            library_source_material: null,
            library_source_molecule: null,
            library_strategy: null
          }) ELSE [] END AS file_filter
          optional Match (sm)<--(file)
          WHERE (file: sequencing_file or file: generic_file OR file:pathology_file OR file:methylation_array_file OR file:cytogenomic_file)
          WITH sm, apoc.coll.union(file_filter, CASE WHEN file IS NOT NULL THEN COLLECT(DISTINCT {
            data_category: apoc.text.split(file.data_category, ';'),
            file_type: file.file_type,
            file_mapping_level: file.file_mapping_level,
            library_selection: null,
            library_source_material: null,
            library_source_molecule: null,
            library_strategy: null
          }) ELSE [] END) AS file_filter
          optional match (st:study)<-[*..5]-(sm)
          optional match (sm)<--(file)
          where (file: sequencing_file or file: generic_file or file: pathology_file or file: methylation_array_file or file: cytogenomic_file)
          OPTIONAL MATCH (sm)<-[:of_diagnosis]-(dg:diagnosis)
          optional match (sm)<-[:of_genetic_analysis]-(ga:genetic_analysis)
          WITH sm, file, file_filter, st, dg, ga
          RETURN DISTINCT
            sm.id as id,
            sm.sample_id as sample_id,
            null as pid,
            null as participant_id,
            null as race,
            null as sex_at_birth,
            apoc.text.split(sm.anatomic_site, ';') as sample_anatomic_site,
            sm.anatomic_site as sample_anatomic_site_str,
            sm.participant_age_at_collection as participant_age_at_collection,
            sm.sample_tumor_status as sample_tumor_status,
            sm.tumor_classification as tumor_classification,
            st.study_id as study_id,
            st.dbgap_accession as dbgap_accession,
            st.study_status AS study_status,
            st.study_acronym as study_acronym,
            st.study_name as study_name,
            COLLECT(DISTINCT {
                age_at_diagnosis: dg.age_at_diagnosis,
                diagnosis_anatomic_site: apoc.text.split(dg.anatomic_site, ';'),
                disease_phase: dg.disease_phase,
                diagnosis_classification_system: dg.diagnosis_classification_system,
                diagnosis_category: apoc.text.split(dg.diagnosis_category, ';'),
                diagnosis_basis: dg.diagnosis_basis,
                tumor_grade_source: dg.tumor_grade_source,
                tumor_stage_source: dg.tumor_stage_source,
                diagnosis: dg.diagnosis
            }) AS diagnosis_filters,
            COLLECT(DISTINCT {
              reported_significance: ga.reported_significance,
              reported_significance_system: ga.reported_significance_system,
              gene_symbol: case when ga is not null then apoc.coll.toSet(CASE
                                  WHEN ga.gene_symbol STARTS WITH '[' AND ga.gene_symbol ENDS WITH ']' THEN
                                    [x IN split(replace(substring(ga.gene_symbol, 1, size(ga.gene_symbol)-2), "'", ""), ",") | 
                                      CASE 
                                        WHEN apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') = '' 
                                        THEN 'Not Reported' 
                                        ELSE apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') 
                                      END
                                    ]
                                  ELSE
                                    [CASE 
                                      WHEN apoc.text.replace(trim(ga.gene_symbol), '^[^A-Za-z0-9]+', '') = '' 
                                      THEN 'Not Reported' 
                                      ELSE apoc.text.replace(trim(ga.gene_symbol), '^[^A-Za-z0-9]+', '') 
                                    END]
                                END) else null end,
              alteration: ga.alteration,
              fusion_partner_gene: ga.fusion_partner_gene,
              alteration_type: ga.alteration_type,
              status: ga.status
            }) AS genetic_analysis_filters,
            null AS survival_filters,
            null as treatment_filters,
            null as treatment_response_filters,
            file_filter AS file_filters,
            COUNT(DISTINCT file.dcf_indexd_guid) as file_count,
            COUNT(DISTINCT file.dcf_indexd_guid) as direct_file_count,
            COLLECT(DISTINCT file.dcf_indexd_guid) as files

  - index_name: files_table
    type: neo4j
    mapping:
      id: # a.k.a file primary key use dcf_indexd_guid as unique identifier
        type: keyword
      file_id:
        type: keyword
      # Participant fields
      pid: # a.k.a participant_pk
        type: keyword
      participant_id:
        type: keyword
      sample_id:
        type: keyword
      # Study fields
      study_id:
        type: keyword
      dbgap_accession:
        type: keyword
      study_status:
        type: keyword
      study_acronym:
        type: keyword
      study_name:
        type: keyword
      # File fields
      guid:
        type: keyword
      file_name:
        type: keyword
      file_access:
        type: keyword
      data_category:
        type: keyword
      file_type:
        type: keyword
      file_mapping_level:
        type: keyword
      file_description:
        type: keyword
      file_size:
        type: long
      md5sum:
        type: keyword
      library_selection:
        type: keyword
        fields:
          sort:
            type: keyword
            normalizer: lowercase
      library_source_material:
        type: keyword
        fields:
          sort:
            type: keyword
            normalizer: lowercase
      library_source_molecule:
        type: keyword
        fields:
          sort:
            type: keyword
            normalizer: lowercase
      library_strategy:
        type: keyword
        fields:
          sort:
            type: keyword
            normalizer: lowercase
      files:
        type: text
        fields:
          keyword:
            type: keyword
      combined_filters:
        type: nested
        properties:
          participant_id:
            type: keyword
          race:
            type: keyword
          sex_at_birth:
            type: keyword
          survival_filters:
            type: nested
            properties:
              last_known_survival_status:
                type: keyword
              age_at_last_known_survival_status:
                type: integer
              cause_of_death:
                type: keyword
              first_event:
                type: keyword
          treatment_filters:
            type: nested
            properties:
              treatment_type:
                type: keyword
              treatment_agent:
                type: keyword
              age_at_treatment_start:
                type: integer
              age_at_treatment_end:
                type: integer
          treatment_response_filters:
            type: nested
            properties:
              response:
                type: keyword
              response_category:
                type: keyword
              age_at_response:
                type: integer
              response_system:
                type: keyword
          # Sample+Diagnosis+Genetic Analysis filters
          sample_diagnosis_genetic_analysis_filters:
            type: nested
            properties:
              # Sample facets
              sample_anatomic_site:
                type: keyword
              participant_age_at_collection:
                type: integer
              sample_tumor_status:
                type: keyword
              tumor_classification:
                type: keyword
              # Diagnosis facets
              age_at_diagnosis:
                type: integer
              diagnosis_anatomic_site:
                type: keyword
              disease_phase:
                type: keyword
              diagnosis_classification_system:
                type: keyword
              diagnosis_basis:
                type: keyword  
              diagnosis:
                type: keyword
              diagnosis_category:
                type: keyword
              # Genetic Analysis facets
              reported_significance:
                type: keyword
              reported_significance_system:
                type: keyword
              gene_symbol:
                type: keyword
              alteration:
                type: keyword
              fusion_partner_gene:
                type: keyword
              alteration_type:
                type: keyword
              status:
                type: keyword
    # Cypher query will be used to retrieve data from Neo4j, and index into Elasticsearch
    cypher_queries:
      - query: |
          MATCH (file)
          where (file:clinical_measure_file or file: generic_file or file:radiology_file)
          MATCH (p:participant)<--(file)
          with distinct file.dcf_indexd_guid as file_guid
          SKIP $skip LIMIT $limit
          MATCH (file)
          where (file:clinical_measure_file or file: generic_file or file:radiology_file) and file.dcf_indexd_guid = file_guid
          MATCH (p:participant)<--(file)
          with distinct file
          // combination 1
          match (p:participant)<--(file)
          optional match (p)<--(sm:sample)
          optional match (p)<--(dg:diagnosis)
          optional match (p)<--(ga:genetic_analysis)
          with file, p, CASE WHEN collect(sm) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_filter
          // combination 2
          match (p:participant)<--(file)
          optional match (p)<--(sm:sample)
          optional match (p)<--(dg:diagnosis)
          optional match (sm)<--(ga:genetic_analysis)
          with file, p, sample_diagnosis_genetic_analysis_filter, CASE WHEN collect(sm) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_filter_1
          with file, p, apoc.coll.union(sample_diagnosis_genetic_analysis_filter, sample_diagnosis_genetic_analysis_filter_1) as sample_diagnosis_genetic_analysis_filter
          // combination 3
          match (p:participant)<--(file)
          optional match (p)<--(sm:sample)
          optional match (sm)<--(dg:diagnosis)
          optional match (p)<--(ga:genetic_analysis)
          with file, p, sample_diagnosis_genetic_analysis_filter, CASE WHEN collect(sm) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_filter_1
          with file, p, apoc.coll.union(sample_diagnosis_genetic_analysis_filter, sample_diagnosis_genetic_analysis_filter_1) as sample_diagnosis_genetic_analysis_filter
          // combination 4
          match (p:participant)<--(file)
          optional match (p)<--(sm:sample)
          optional match (sm)<--(dg:diagnosis)
          optional match (sm)<--(ga:genetic_analysis)
          with file, p, sample_diagnosis_genetic_analysis_filter, CASE WHEN collect(sm) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_filter_1
          with file, p, apoc.coll.union(sample_diagnosis_genetic_analysis_filter, sample_diagnosis_genetic_analysis_filter_1) as sample_diagnosis_genetic_analysis_filter
          // combination 5
          match (p:participant)<--(file)
          optional match (p)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2:sample)
          where (cl: cell_line or cl: pdx)
          optional match (p)<--(dg:diagnosis)
          optional match (p)<--(ga:genetic_analysis)
          with file, p, sample_diagnosis_genetic_analysis_filter, CASE WHEN collect(sm2) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm2, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_filter_1
          with file, p, apoc.coll.union(sample_diagnosis_genetic_analysis_filter, sample_diagnosis_genetic_analysis_filter_1) as sample_diagnosis_genetic_analysis_filter
          // combination 6
          match (p:participant)<--(file)
          optional match (p)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2:sample)
          where (cl: cell_line or cl: pdx)
          optional match (p)<--(dg:diagnosis)
          optional match (sm1)<--(ga:genetic_analysis)
          with file, p, sample_diagnosis_genetic_analysis_filter, CASE WHEN collect(sm2) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm2, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_filter_1
          with file, p, apoc.coll.union(sample_diagnosis_genetic_analysis_filter, sample_diagnosis_genetic_analysis_filter_1) as sample_diagnosis_genetic_analysis_filter
          // combination 7
          match (p:participant)<--(file)
          optional match (p)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2:sample)
          where (cl: cell_line or cl: pdx)
          optional match (p)<--(dg:diagnosis)
          optional match (sm2)<--(ga:genetic_analysis)
          with file, p, sample_diagnosis_genetic_analysis_filter, sm1, sm2, dg, ga
          with file, p, sample_diagnosis_genetic_analysis_filter,
            apoc.coll.union(
              CASE WHEN collect(sm1) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm1, dg: dg, ga: ga}) ELSE [] END,
              CASE WHEN collect(sm2) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm2, dg: dg, ga: ga}) ELSE [] END
            ) as sample_diagnosis_genetic_analysis_filter_1
          with file, p, apoc.coll.union(sample_diagnosis_genetic_analysis_filter, sample_diagnosis_genetic_analysis_filter_1) as sample_diagnosis_genetic_analysis_filter
          // combination 8
          match (p:participant)<--(file)
          optional match (p)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2:sample)
          where (cl: cell_line or cl: pdx)
          optional match (sm1)<--(dg:diagnosis)
          optional match (p)<--(ga:genetic_analysis)
          with file, p, sample_diagnosis_genetic_analysis_filter, CASE WHEN collect(sm2) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm2, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_filter_1
          with file, p, apoc.coll.union(sample_diagnosis_genetic_analysis_filter, sample_diagnosis_genetic_analysis_filter_1) as sample_diagnosis_genetic_analysis_filter
          // combination 9
          match (p:participant)<--(file)
          optional match (p)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2:sample)
          where (cl: cell_line or cl: pdx)
          optional match (sm1)<--(dg:diagnosis)
          optional match (sm1)<--(ga:genetic_analysis)
          with file, p, sample_diagnosis_genetic_analysis_filter, CASE WHEN collect(sm2) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm2, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_filter_1
