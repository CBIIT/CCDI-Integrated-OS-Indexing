            tr.treatment_id AS treatment_id,
            p.id as id,
            p.participant_id as participant_id,
            apoc.text.split(p.race, ';') as race,
            p.race as race_str,
            p.sex_at_birth as sex_at_birth,
            tr.age_at_treatment_end AS age_at_treatment_end,
            (CASE tr.age_at_treatment_end
              WHEN -999 THEN "Not Reported"
              ELSE tr.age_at_treatment_end
            END) AS age_at_treatment_end_str,
            tr.age_at_treatment_start AS age_at_treatment_start,
            (CASE tr.age_at_treatment_start
