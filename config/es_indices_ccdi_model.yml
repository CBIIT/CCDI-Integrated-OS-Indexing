          }) as sample_genetic_analysis_file_filter
          optional match (p:participant)<-[*..3]-(dg)
          OPTIONAL MATCH (p)<-[:of_survival]-(su:survival)
          OPTIONAL MATCH (p)<-[:of_treatment]-(tr:treatment)
          OPTIONAL MATCH (p)<-[:of_treatment_response]-(tresp:treatment_response)
          with dg, p, sample_genetic_analysis_file_filter, CASE WHEN su IS NOT NULL THEN COLLECT(DISTINCT {last_known_survival_status: su.last_known_survival_status, 
