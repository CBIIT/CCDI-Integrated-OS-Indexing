            END) AS age_at_last_known_survival_status_str,
            su.last_known_survival_status as last_known_survival_status,
            su.event_free_survival_status as event_free_survival_status,
            su.first_event as first_event,
            su.cause_of_death as cause_of_death,
            st.study_id as study_id,
            st.dbgap_accession as dbgap_accession,
            st.study_status AS study_status,
            st.study_acronym as study_acronym,
            st.study_name as study_name,
            treatment_filters as treatment_filters,
            treatment_response_filters as treatment_response_filters,
            sample_diagnosis_genetic_analysis_file_filter AS sample_diagnosis_genetic_analysis_file_filter
        page_size: 100

  - index_name: treatments_table
    type: neo4j
    mapping:
      id: # a.k.a treatment primary key
        type: keyword
      treatment_id: 
        type: keyword
      # Participant fields
      pid: # a.k.a participant_pk
        type: keyword
      participant_id:
        type: keyword
        normalizer: lowercase
      race:
        type: keyword
      sex_at_birth:
        type: keyword
      # Study fields
      study_id:
        type: keyword
      dbgap_accession:
        type: keyword
      study_status:
        type: keyword
      study_acronym:
        type: keyword
      study_name:
        type: keyword
      # Treatment fields
      age_at_treatment_end:
        type: integer
      age_at_treatment_end_str:
        type: keyword
      age_at_treatment_start:
        type: integer
      age_at_treatment_start_str:
        type: keyword
      treatment_agent:
        type: keyword
      treatment_agent_str:
        type: keyword
      treatment_type:
        type: keyword
      treatment_type_str:
        type: keyword
      # Survival filters
      survival_filters:
        type: nested
        properties:
          last_known_survival_status:
            type: keyword
          age_at_last_known_survival_status:
            type: integer
          cause_of_death:
            type: keyword
          first_event:
            type: keyword
      # Treatment response filters
      treatment_response_filters:
        type: nested
        properties:
          age_at_response:
            type: integer
          response:
            type: keyword
          response_category:
            type: keyword
          response_system:
            type: keyword
      # Sample+Diagnosis+Genetic Analysis+File filters
      sample_diagnosis_genetic_analysis_file_filters:
        type: nested
        properties:
          # Sample facets
          sample_anatomic_site:
            type: keyword
          participant_age_at_collection:
            type: integer
          sample_tumor_status:
            type: keyword
          tumor_classification:
            type: keyword
          # Diagnosis facets
          diagnosis:
            type: keyword
          diagnosis_category:
            type: keyword
          diagnosis_anatomic_site:
            type: keyword
          age_at_diagnosis:
            type: integer
          diagnosis_classification_system:
            type: keyword
          diagnosis_basis:
            type: keyword          
          disease_phase:
            type: keyword
          # Genetic Analysis facets
          reported_significance:
            type: keyword
          reported_significance_system:
            type: keyword
          gene_symbol:
            type: keyword
          alteration:
            type: keyword
          fusion_partner_gene:
            type: keyword
          alteration_type:
            type: keyword
          status:
            type: keyword
          # File facets
          data_category:
            type: keyword
          file_type:
            type: keyword
          file_mapping_level:
            type: keyword
          library_selection:
            type: keyword
          library_source_material:
            type: keyword
          library_source_molecule:
            type: keyword
          library_strategy:
            type: keyword
    # Cypher query will be used to retrieve data from Neo4j, and index into Elasticsearch
    cypher_queries:
      - query: |
          MATCH (p:participant)
          WITH p
          SKIP $skip LIMIT $limit
          // combination 1
          optional match (p)<--(sm:sample)
          optional match (p)<--(file)
          where (file: clinical_measure_file or file:generic_file or file: radiology_file)
          optional match (p)<--(ga:genetic_analysis)
          optional match (p)<--(dg:diagnosis)
          with distinct p, sm, file, ga, dg
          with p, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm, file: file, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_file_filter
          // combination 2
          optional match (p)<--(sm:sample)
          optional match (p)<--(file)
          where (file: clinical_measure_file or file:generic_file or file: radiology_file)
          optional match (sm)<--(ga:genetic_analysis)
          optional match (sm)<--(dg:diagnosis)
          with p, sample_diagnosis_genetic_analysis_file_filter, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm, file: file, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_genetic_analysis_file_filter, sample_diagnosis_genetic_analysis_file_filter_1) as sample_diagnosis_genetic_analysis_file_filter
