          with file, apoc.coll.union(sample_diagnosis_genetic_analysis_filter, sample_diagnosis_genetic_analysis_filter_1) as sample_diagnosis_genetic_analysis_filter
          with file, CASE WHEN size(sample_diagnosis_genetic_analysis_filter) > 0 THEN sample_diagnosis_genetic_analysis_filter ELSE [null] END as sample_diagnosis_genetic_analysis_filter
          unwind sample_diagnosis_genetic_analysis_filter as row
          with file, row
          with file, collect(distinct {
            // Sample facets
            sample_anatomic_site: case when row.sm is not null then apoc.text.split(row.sm.anatomic_site, ';') else null end,
            participant_age_at_collection: case when row.sm is not null then row.sm.participant_age_at_collection else null end,
