            type: nested
            properties:
              response:
                type: keyword
              response_category:
                type: keyword
              age_at_response:
                type: integer
              response_system:
                type: keyword
          # Sample+Diagnosis+Genetic Analysis filters
          sample_diagnosis_genetic_analysis_filters:
            type: nested
            properties:
              # Sample facets
              sample_anatomic_site:
                type: keyword
              participant_age_at_collection:
                type: integer
              sample_tumor_status:
                type: keyword
              tumor_classification:
                type: keyword
              # Diagnosis facets
              age_at_diagnosis:
                type: integer
              diagnosis_anatomic_site:
                type: keyword
              disease_phase:
                type: keyword
              diagnosis_classification_system:
                type: keyword
              diagnosis_basis:
                type: keyword  
              diagnosis:
                type: keyword
              diagnosis_category:
                type: keyword
              # Genetic Analysis facets
              reported_significance:
                type: keyword
              reported_significance_system:
                type: keyword
              gene_symbol:
                type: keyword
              alteration:
                type: keyword
              fusion_partner_gene:
                type: keyword
              alteration_type:
                type: keyword
              status:
                type: keyword
    # Cypher query will be used to retrieve data from Neo4j, and index into Elasticsearch
    cypher_queries:
      - query: |
          MATCH (file: clinical_measure_file)-->(s:study)
      - query: |
          MATCH (file: clinical_measure_file)-->(p:participant)
      
      - query: |
