        type: keyword
      diagnosis_category_str:
        type: keyword
      diagnosis_anatomic_site:
        type: keyword
      diagnosis_anatomic_site_str:
        type: keyword
      age_at_diagnosis:
        type: integer
      diagnosis_classification_system: # for display
        type: keyword
      diagnosis_classification_system_str: # for sorting
        type: keyword
      diagnosis_basis: # for display
        type: keyword
      diagnosis_basis_str: # for sorting
        type: keyword
      diagnosis_comment:
        type: keyword
      disease_phase:
        type: keyword
      tumor_classification:
        type: keyword
      toronto_childhood_cancer_staging:
        type: keyword
      tumor_grade:
        type: keyword
      tumor_stage_clinical_m:
        type: keyword
      tumor_stage_clinical_n:
        type: keyword
      tumor_stage_clinical_t:
        type: keyword
      # Survival filters
      survival_filters:
        type: nested
        properties:
          last_known_survival_status:
            type: keyword
          age_at_last_known_survival_status:
            type: integer
          cause_of_death:
            type: keyword
          first_event:
            type: keyword
      # Treatment filters
      treatment_filters:
        type: nested
        properties:
          treatment_type:
            type: keyword
          treatment_agent:
            type: keyword
          age_at_treatment_start:
            type: integer
          age_at_treatment_end:
            type: integer
      # Treatment response filters
      treatment_response_filters:
        type: nested
        properties:
          age_at_response:
            type: integer
          response:
            type: keyword
          response_category:
            type: keyword
          response_system:
            type: keyword
      # Sample+Genetic Analysis+File filters
      sample_genetic_analysis_file_filters:
        type: nested
        properties:
          # Sample facets
          sample_anatomic_site:
            type: keyword
          participant_age_at_collection:
            type: integer
          sample_tumor_status:
            type: keyword
          tumor_classification:
            type: keyword
          # Genetic Analysis facets
          reported_significance:
            type: keyword
          reported_significance_system:
            type: keyword
          gene_symbol:
            type: keyword
          alteration:
            type: keyword
          fusion_partner_gene:
            type: keyword
          alteration_type:
            type: keyword
          status:
            type: keyword
          # File facets
          data_category:
            type: keyword
          file_type:
            type: keyword
          file_mapping_level:
            type: keyword
          library_selection:
            type: keyword
          library_source_material:
            type: keyword
          library_source_molecule:
            type: keyword
          library_strategy:
            type: keyword
    # Cypher query will be used to retrieve data from Neo4j, and index into Elasticsearch
    cypher_queries:
      - query: |
          Match (st:study)<--(cg:consent_group)<--(p:participant)<--(dg:diagnosis)
          WITH distinct p
          SKIP $skip LIMIT $limit
          // combination 1
          optional Match (st:study)<--(p)
          optional MATCH (st)<--(cl)<--(sm:sample)
          WHERE (cl: cell_line or cl: pdx)
          optional match (sm)<--(ga:genetic_analysis)
          optional Match (st)<--(file)
          WHERE (file: clinical_measure_file or file: generic_file)
          with p, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm, file: file, ga: ga}) ELSE [] END as sample_genetic_analysis_file_filter
          // combination 2
          optional Match (st:study)<--(p)
          optional MATCH (st)<--(cl)<--(sm:sample)
          WHERE (cl: cell_line or cl: pdx)
          optional match (p)<--(ga:genetic_analysis)
          optional Match (st)<--(file)
          WHERE (file: clinical_measure_file or file: generic_file)
          with p, sample_genetic_analysis_file_filter, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm, file: file, ga: ga}) ELSE [] END as sample_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_genetic_analysis_file_filter, sample_genetic_analysis_file_filter_1) as sample_genetic_analysis_file_filter
          // combination 3
          optional Match (st:study)<--(p)
          optional MATCH (p)<--(sm:sample)
          optional match (sm)<--(ga:genetic_analysis)
          optional Match (st)<--(file)
          WHERE (file: clinical_measure_file or file: generic_file)
          with p, sample_genetic_analysis_file_filter, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm, file: file, ga: ga}) ELSE [] END as sample_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_genetic_analysis_file_filter, sample_genetic_analysis_file_filter_1) as sample_genetic_analysis_file_filter
          // combination 4
          optional Match (st:study)<--(p)
          optional MATCH (p)<--(sm:sample)
          optional match (p)<--(ga:genetic_analysis)
          optional Match (st)<--(file)
          WHERE (file: clinical_measure_file or file: generic_file)
          with p, sample_genetic_analysis_file_filter, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm, file: file, ga: ga}) ELSE [] END as sample_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_genetic_analysis_file_filter, sample_genetic_analysis_file_filter_1) as sample_genetic_analysis_file_filter
          // combination 5
          optional Match (st:study)<--(p)
          optional MATCH (p)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2:sample)
          WHERE (cl: cell_line or cl: pdx)
          optional match (sm1)<--(ga:genetic_analysis)
          optional Match (st)<--(file)
          WHERE (file: clinical_measure_file or file: generic_file)
          with p, sample_genetic_analysis_file_filter, sm1, sm2, file, ga
          with p, sample_genetic_analysis_file_filter,
            apoc.coll.union(
              CASE WHEN collect(sm1) <> [] OR collect(file) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm1, file: file, ga: ga}) ELSE [] END,
              CASE WHEN collect(sm2) <> [] OR collect(file) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm2, file: file, ga: ga}) ELSE [] END
            ) as sample_genetic_analysis_file_filter_1
