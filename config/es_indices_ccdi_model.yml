                                        ELSE apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') 
                                      END
                                    ]
                                  ELSE
                                    [CASE 
                                      WHEN apoc.text.replace(trim(row.ga.gene_symbol), '^[^A-Za-z0-9]+', '') = '' 
                                      THEN 'Not Reported' 
                                      ELSE apoc.text.replace(trim(row.ga.gene_symbol), '^[^A-Za-z0-9]+', '') 
                                    END]
                                END) else null end,
            alteration: case when row.ga is not null then row.ga.alteration else null end,
            fusion_partner_gene: case when row.ga is not null then row.ga.fusion_partner_gene else null end,
            alteration_type: case when row.ga is not null then row.ga.alteration_type else null end,
            status: case when row.ga is not null then row.ga.status else null end,
            // File facets
            data_category: case when row.file is not null then apoc.text.split(row.file.data_category, ';') else null end,
            file_type: case when row.file is not null then row.file.file_type else null end,
            file_mapping_level: case when row.file is not null then row.file.file_mapping_level else null end,
            library_selection: case when row.file is not null and size(labels(row.file)) > 0 and labels(row.file)[0] = 'sequencing_file' then row.file.library_selection else null end,
            library_source_material: case when row.file is not null and size(labels(row.file)) > 0 and labels(row.file)[0] = 'sequencing_file' then row.file.library_source_material else null end,
            library_source_molecule: case when row.file is not null and size(labels(row.file)) > 0 and labels(row.file)[0] = 'sequencing_file' then row.file.library_source_molecule else null end,
            library_strategy: case when row.file is not null and size(labels(row.file)) > 0 and labels(row.file)[0] = 'sequencing_file' then row.file.library_strategy else null end
          }) as sample_diagnosis_genetic_analysis_file_filter
          MATCH (p)<-[:of_survival]-(su:survival)
          OPTIONAL MATCH (st:study)<-[:of_consent_group]-(cg:consent_group)<-[:of_participant]-(p)
          OPTIONAL MATCH (p)<-[:of_treatment]-(tr:treatment)
          OPTIONAL MATCH (p)<-[:of_treatment_response]-(tresp:treatment_response)
          WITH distinct su, p, sample_diagnosis_genetic_analysis_file_filter, st,
          CASE WHEN tr IS NOT NULL THEN COLLECT(DISTINCT{
            treatment_type: apoc.text.split(tr.treatment_type, ';'),
            treatment_agent: apoc.text.split(tr.treatment_agent, ';'),
            age_at_treatment_start: tr.age_at_treatment_start,
            age_at_treatment_end: tr.age_at_treatment_end}) ELSE [] END as treatment_filters,
          CASE WHEN tresp IS NOT NULL THEN COLLECT(DISTINCT{
            age_at_response: tresp.age_at_response,
            response: tresp.response,
            response_category: tresp.response_category,
            response_system: tresp.response_system}) ELSE [] END as treatment_response_filters
          RETURN DISTINCT
            su.id as id,
            su.survival_id AS survival_id,
            p.id as pid,
            p.participant_id as participant_id,
            apoc.text.split(p.race, ';') as race,
            p.race as race_str,
            p.sex_at_birth as sex_at_birth,
            su.age_at_event_free_survival_status AS age_at_event_free_survival_status,
            (CASE su.age_at_event_free_survival_status
              WHEN -999 THEN "Not Reported"
              ELSE su.age_at_event_free_survival_status
            END) AS age_at_event_free_survival_status_str,
            su.age_at_last_known_survival_status AS age_at_last_known_survival_status,
            (CASE su.age_at_last_known_survival_status
              WHEN -999 THEN "Not Reported"
              ELSE su.age_at_last_known_survival_status
            END) AS age_at_last_known_survival_status_str,
            su.last_known_survival_status as last_known_survival_status,
            su.event_free_survival_status as event_free_survival_status,
            su.first_event as first_event,
            su.cause_of_death as cause_of_death,
            st.study_id as study_id,
            st.dbgap_accession as dbgap_accession,
            st.study_status AS study_status,
            st.study_acronym as study_acronym,
            st.study_name as study_name,
            treatment_filters as treatment_filters,
            treatment_response_filters as treatment_response_filters,
            sample_diagnosis_genetic_analysis_file_filter AS sample_diagnosis_genetic_analysis_file_filters
        page_size: 100

  - index_name: treatments_table
    type: neo4j
    mapping:
      id: # a.k.a treatment primary key
        type: keyword
      treatment_id: 
        type: keyword
      # Participant fields
      pid: # a.k.a participant_pk
        type: keyword
      participant_id:
        type: keyword
        normalizer: lowercase
      race:
        type: keyword
      sex_at_birth:
        type: keyword
      # Study fields
      study_id:
        type: keyword
      dbgap_accession:
        type: keyword
      study_status:
        type: keyword
      study_acronym:
        type: keyword
      study_name:
        type: keyword
      # Treatment fields
      age_at_treatment_end:
        type: integer
      age_at_treatment_end_str:
        type: keyword
      age_at_treatment_start:
        type: integer
      age_at_treatment_start_str:
        type: keyword
      treatment_agent:
        type: keyword
      treatment_agent_str:
        type: keyword
      treatment_type:
        type: keyword
      treatment_type_str:
        type: keyword
      # Survival filters
      survival_filters:
        type: nested
        properties:
          last_known_survival_status:
            type: keyword
          age_at_last_known_survival_status:
            type: integer
          cause_of_death:
            type: keyword
          first_event:
            type: keyword
      # Treatment response filters
      treatment_response_filters:
        type: nested
        properties:
          age_at_response:
            type: integer
          response:
            type: keyword
          response_category:
            type: keyword
          response_system:
            type: keyword
      # Sample+Diagnosis+Genetic Analysis+File filters
      sample_diagnosis_genetic_analysis_file_filters:
        type: nested
