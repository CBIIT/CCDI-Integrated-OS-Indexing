              response_system: tresp.response_system}) ELSE [] END as treatment_response_filters
          with file.dcf_indexd_guid as file_uid, p, sm2, sm1, sm, sample_diagnosis_genetic_analysis_filter, survival_filters, treatment_filters, treatment_response_filters
          WITH file_uid, p, sm2, sm1, sm,
