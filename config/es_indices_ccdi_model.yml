          with p, sample_genetic_analysis_file_filter, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm, file: file, ga: ga}) ELSE [] END as sample_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_genetic_analysis_file_filter, sample_genetic_analysis_file_filter_1) as sample_genetic_analysis_file_filter
