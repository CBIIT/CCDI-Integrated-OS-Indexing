            ) as sample_diagnosis_genetic_analysis_filter_1
          with file, apoc.coll.union(sample_diagnosis_genetic_analysis_filter, sample_diagnosis_genetic_analysis_filter_1) as sample_diagnosis_genetic_analysis_filter
          // combination 17
          match (sm1:sample)<--(file)
          optional match (p:participant)<-[:of_sample]-(sm1)<--(cl)<--(sm2:sample)
          where (cl: cell_line or cl: pdx)
          optional match (sm1)<--(dg:diagnosis)
          optional match (p)<--(ga:genetic_analysis)
          with file, sample_diagnosis_genetic_analysis_filter, CASE WHEN collect(sm2) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm2, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_filter_1
          with file, apoc.coll.union(sample_diagnosis_genetic_analysis_filter, sample_diagnosis_genetic_analysis_filter_1) as sample_diagnosis_genetic_analysis_filter
          // combination 18
          match (sm1:sample)<--(file)
          optional match (p:participant)<-[:of_sample]-(sm1)<--(cl)<--(sm2:sample)
          where (cl: cell_line or cl: pdx)
          optional match (sm1)<--(dg:diagnosis)
