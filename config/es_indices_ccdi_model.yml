              treatment_agent: apoc.text.split(tr.treatment_agent, ';'),
              age_at_treatment_start: tr.age_at_treatment_start,
              age_at_treatment_end: tr.age_at_treatment_end}) ELSE [] END AS treatment_filters,
          CASE WHEN tresp IS NOT NULL THEN COLLECT(DISTINCT{
            age_at_response: tresp.age_at_response,
            response: tresp.response,
            response_category: tresp.response_category,
            response_system: tresp.response_system}) ELSE [] END AS treatment_response_filters
          optional match (st:study)<-[*..6]-(dg)
          with dg, p, st, survival_filters, treatment_filters, treatment_response_filters, sample_genetic_analysis_file_filter
          RETURN DISTINCT
            dg.id as id,
            dg.diagnosis_id as diagnosis_id,
            p.id as pid,
            p.participant_id as participant_id,
            apoc.text.split(p.race, ';') as race,
            p.sex_at_birth as sex_at_birth,
            st.study_id as study_id,
            st.dbgap_accession as dbgap_accession,
            st.study_status AS study_status,
            st.study_acronym as study_acronym,
            st.study_name as study_name,
            dg.diagnosis as diagnosis,
            apoc.text.split(dg.diagnosis_category, ';') as diagnosis_category,
            dg.diagnosis_category as diagnosis_category_str,
            apoc.text.split(dg.anatomic_site, ';') as diagnosis_anatomic_site,
            dg.anatomic_site as diagnosis_anatomic_site_str,
            dg.age_at_diagnosis as age_at_diagnosis,
            apoc.text.split(dg.diagnosis_classification_system, ';') as diagnosis_classification_system,
            dg.diagnosis_classification_system as diagnosis_classification_system_str,
            apoc.text.split(dg.diagnosis_basis, ';') as diagnosis_basis,
            dg.diagnosis_basis as diagnosis_basis_str,
            dg.diagnosis_comment as diagnosis_comment,
            dg.disease_phase as disease_phase,
            dg.tumor_classification as tumor_classification,
            dg.toronto_childhood_cancer_staging as toronto_childhood_cancer_staging,
            dg.tumor_grade as tumor_grade,
            dg.tumor_stage_clinical_m as tumor_stage_clinical_m,
            dg.tumor_stage_clinical_n as tumor_stage_clinical_n,
            dg.tumor_stage_clinical_t as tumor_stage_clinical_t,
            survival_filters as survival_filters, 
            treatment_filters as treatment_filters,
            treatment_response_filters as treatment_response_filters,
            sample_genetic_analysis_file_filter AS sample_genetic_analysis_file_filters
        page_size: 100

  - index_name: genetic_analyses_table
    type: neo4j
    mapping:
      id: # a.k.a genetic_analysis primary key
        type: keyword
      genetic_analysis_id:
        type: keyword
      # Participant fields
      pid: # a.k.a participant_pk
        type: keyword
      participant_id:
        type: keyword
      race:
        type: keyword
      sex_at_birth:
        type: keyword
      # Study fields
      dbgap_accession:
        type: keyword
      study_status:
        type: keyword
      study_id:
        type: keyword
      study_acronym:
        type: keyword
      study_name:
        type: keyword
      # Genetic Analysis fields
      gene_symbol: # for display
        type: keyword
      gene_symbol_str: # for sorting
        type: keyword
      status:
        type: keyword
      reported_significance:
        type: keyword
      reported_significance_system:
        type: keyword
      hgvs_genome:
        type: keyword
      alteration:
        type: keyword
      hgvs_coding:
        type: keyword
      hgvs_protein:
        type: keyword
      reference_genome:
        type: keyword
      chromosome:
        type: keyword
      cytoband:
        type: keyword
      exon:
        type: keyword
      fusion_partner_exon:
        type: keyword
      fusion_partner_gene:
        type: keyword
      alteration_type:
        type: keyword
      alteration_effect:
        type: keyword
      genomic_source_category:
        type: keyword
      test:
        type: keyword
      # Survival records
      survival_filters:
        type: nested
        properties:
          last_known_survival_status:
            type: keyword
          age_at_last_known_survival_status:
            type: integer
          cause_of_death:
            type: keyword
          first_event:
            type: keyword
      # Treatment filters
      treatment_filters:
        type: nested
        properties:
          treatment_type:
            type: keyword
          treatment_agent:
            type: keyword
          age_at_treatment_start:
            type: integer
          age_at_treatment_end:
            type: integer
      # Treatment response filters
      treatment_response_filters:
        type: nested
        properties:
          age_at_response:
            type: integer
          response:
            type: keyword
          response_category:
            type: keyword
          response_system:
            type: keyword
      # Sample+Diagnosis+File filters
      sample_diagnosis_file_filters:
        type: nested
        properties:
          # Sample facets
          sample_anatomic_site:
            type: keyword
          participant_age_at_collection:
            type: integer
          sample_tumor_status:
            type: keyword
          tumor_classification:
            type: keyword
          # Diagnosis facets
          diagnosis:
            type: keyword
          diagnosis_category:
            type: keyword
          diagnosis_anatomic_site:
            type: keyword
          age_at_diagnosis:
            type: integer
          diagnosis_classification_system:
            type: keyword
          diagnosis_basis:
            type: keyword
          disease_phase:
            type: keyword
          # File facets
          data_category:
            type: keyword
          file_type:
            type: keyword
          file_mapping_level:
            type: keyword
          library_selection:
            type: keyword
          library_source_material:
            type: keyword
          library_source_molecule:
            type: keyword
          library_strategy:
            type: keyword
    cypher_queries:
      - query: |
          Match (st:study)<--(cg:consent_group)<--(p:participant)<--(ga:genetic_analysis)
          WITH distinct p
          SKIP $skip LIMIT $limit
          // combination 1
          optional Match (st:study)<--(p)
          optional MATCH (st)<--(cl)<--(sm:sample)
          WHERE (cl: cell_line or cl: pdx)
          optional match (sm)<--(dg:diagnosis)
          optional Match (st)<--(file)
          WHERE (file: clinical_measure_file or file: generic_file)
          with p, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm, file: file, dg: dg}) ELSE [] END as sample_diagnosis_file_filter
          // combination 2
          optional Match (st:study)<--(p)
          optional MATCH (st)<--(cl)<--(sm:sample)
          WHERE (cl: cell_line or cl: pdx)
          optional match (p)<--(dg:diagnosis)
          optional Match (st)<--(file)
          WHERE (file: clinical_measure_file or file: generic_file)
          with p, sample_diagnosis_file_filter, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm, file: file, dg: dg}) ELSE [] END as sample_diagnosis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_file_filter, sample_diagnosis_file_filter_1) as sample_diagnosis_file_filter
          // combination 3
          optional Match (st:study)<--(p)
          optional MATCH (p)<--(sm:sample)
          optional match (sm)<--(dg:diagnosis)
          optional Match (st)<--(file)
          WHERE (file: clinical_measure_file or file: generic_file)
          with p, sample_diagnosis_file_filter, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm, file: file, dg: dg}) ELSE [] END as sample_diagnosis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_file_filter, sample_diagnosis_file_filter_1) as sample_diagnosis_file_filter
          // combination 4
          optional Match (st:study)<--(p)
          optional MATCH (p)<--(sm:sample)
          optional match (p)<--(dg:diagnosis)
