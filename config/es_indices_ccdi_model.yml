                                    [x IN split(replace(substring(row.ga.gene_symbol, 1, size(row.ga.gene_symbol)-2), "'", ""), ",") | 
                                      CASE 
                                        WHEN apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') = '' 
                                        THEN 'Not Reported' 
                                        ELSE apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') 
                                      END
                                    ]
                                  ELSE
                                    [CASE 
                                      WHEN apoc.text.replace(trim(row.ga.gene_symbol), '^[^A-Za-z0-9]+', '') = '' 
