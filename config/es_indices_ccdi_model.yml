            type: keyword
          diagnosis_anatomic_site:
            type: keyword
          age_at_diagnosis:
            type: integer
          diagnosis_classification_system:
            type: keyword
          diagnosis_basis:
            type: keyword          
          disease_phase:
            type: keyword
          # Genetic Analysis facets
          reported_significance:
            type: keyword
          reported_significance_system:
            type: keyword
          gene_symbol:
            type: keyword
          alteration:
            type: keyword
          fusion_partner_gene:
            type: keyword
          alteration_type:
            type: keyword
          status:
            type: keyword
          # File facets
          data_category:
            type: keyword
          file_type:
            type: keyword
          file_mapping_level:
            type: keyword
          library_selection:
            type: keyword
          library_source_material:
            type: keyword
          library_source_molecule:
            type: keyword
          library_strategy:
