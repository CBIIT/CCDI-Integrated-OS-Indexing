          optional match (sm2)<--(dg:diagnosis)
          optional match (sm1)<--(ga:genetic_analysis)
          with file, p, sample_diagnosis_genetic_analysis_filter, sm1, sm2, dg, ga
          with file, p, sample_diagnosis_genetic_analysis_filter,
            apoc.coll.union(
              CASE WHEN collect(sm1) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm1, dg: dg, ga: ga}) ELSE [] END,
              CASE WHEN collect(sm2) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm2, dg: dg, ga: ga}) ELSE [] END
            ) as sample_diagnosis_genetic_analysis_filter_1
          with file, p, apoc.coll.union(sample_diagnosis_genetic_analysis_filter, sample_diagnosis_genetic_analysis_filter_1) as sample_diagnosis_genetic_analysis_filter
          // combination 13
          match (st:study)<--(file)
          optional match (st)<-[:of_consent_group]-(cg:consent_group)<-[:of_participant]-(p:participant)
          optional match (p)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2:sample)
          where (cl: cell_line or cl: pdx)
          optional match (sm2)<--(dg:diagnosis)
          optional match (sm2)<--(ga:genetic_analysis)
          with file, p, sample_diagnosis_genetic_analysis_filter, sm1, sm2, dg, ga
          with file, p, sample_diagnosis_genetic_analysis_filter,
            apoc.coll.union(
              CASE WHEN collect(sm1) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm1, dg: dg, ga: ga}) ELSE [] END,
              CASE WHEN collect(sm2) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN collect(distinct {sm: sm2, dg: dg, ga: ga}) ELSE [] END
            ) as sample_diagnosis_genetic_analysis_filter_1
          with file, p, apoc.coll.union(sample_diagnosis_genetic_analysis_filter, sample_diagnosis_genetic_analysis_filter_1) as sample_diagnosis_genetic_analysis_filter
          with file, p, CASE WHEN size(sample_diagnosis_genetic_analysis_filter) > 0 THEN sample_diagnosis_genetic_analysis_filter ELSE [null] END as sample_diagnosis_genetic_analysis_filter
          unwind sample_diagnosis_genetic_analysis_filter as row
          with file, p, row
          with file, p, collect(distinct {
            // Sample facets
            sample_anatomic_site: case when row.sm is not null then apoc.text.split(row.sm.anatomic_site, ';') else null end,
            participant_age_at_collection: case when row.sm is not null then row.sm.participant_age_at_collection else null end,
            sample_tumor_status: case when row.sm is not null then row.sm.sample_tumor_status else null end,
            tumor_classification: case when row.sm is not null then row.sm.tumor_classification else null end,
            // Diagnosis facets
            age_at_diagnosis: case when row.dg is not null then row.dg.age_at_diagnosis else null end,
            diagnosis_anatomic_site: case when row.dg is not null then apoc.text.split(row.dg.anatomic_site, ';') else null end,
            disease_phase: case when row.dg is not null then row.dg.disease_phase else null end,
            diagnosis_classification_system: case when row.dg is not null then row.dg.diagnosis_classification_system else null end,
            diagnosis_category: case when row.dg is not null then apoc.text.split(row.dg.diagnosis_category, ';') else null end,
            diagnosis_basis: case when row.dg is not null then row.dg.diagnosis_basis else null end,
            diagnosis: case when row.dg is not null then row.dg.diagnosis else null end,
            // Genetic Analysis facets
            reported_significance: case when row.ga is not null then row.ga.reported_significance else null end,
            reported_significance_system: case when row.ga is not null then row.ga.reported_significance_system else null end,
            gene_symbol: case when row.ga is not null then apoc.coll.toSet(CASE
                                  WHEN row.ga.gene_symbol STARTS WITH '[' AND row.ga.gene_symbol ENDS WITH ']' THEN
                                    [x IN split(replace(substring(row.ga.gene_symbol, 1, size(row.ga.gene_symbol)-2), "'", ""), ",") | 
                                      CASE 
                                        WHEN apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') = '' 
                                        THEN 'Not Reported' 
                                        ELSE apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') 
                                      END
                                    ]
                                  ELSE
                                    [CASE 
                                      WHEN apoc.text.replace(trim(row.ga.gene_symbol), '^[^A-Za-z0-9]+', '') = '' 
                                      THEN 'Not Reported' 
                                      ELSE apoc.text.replace(trim(row.ga.gene_symbol), '^[^A-Za-z0-9]+', '') 
                                    END]
                                END) else null end,
            alteration: case when row.ga is not null then row.ga.alteration else null end,
            fusion_partner_gene: case when row.ga is not null then row.ga.fusion_partner_gene else null end,
            alteration_type: case when row.ga is not null then row.ga.alteration_type else null end,
            status: case when row.ga is not null then row.ga.status else null end
          }) as sample_diagnosis_genetic_analysis_filter
          optional match (p)<-[:of_survival]-(su:survival)
          optional match (p)<-[:of_treatment]-(tr:treatment)
          optional match (p)<-[:of_treatment_response]-(tresp:treatment_response)
          with file, p, sample_diagnosis_genetic_analysis_filter, case when collect(su) <> [] THEN COLLECT(DISTINCT {last_known_survival_status: su.last_known_survival_status, 
              cause_of_death: su.cause_of_death, 
              first_event: su.first_event,
              age_at_last_known_survival_status: su.age_at_last_known_survival_status} ) ELSE [] END as survival_filters,
            case when collect(tr) <> [] THEN COLLECT(DISTINCT{treatment_type: apoc.text.split(tr.treatment_type, ';'),
            treatment_agent: apoc.text.split(tr.treatment_agent, ';'),
            age_at_treatment_start: tr.age_at_treatment_start,
            age_at_treatment_end: tr.age_at_treatment_end}) ELSE [] END as treatment_filters,
            case when collect(tresp) <> [] THEN COLLECT(DISTINCT{response_category: tresp.response_category,
            age_at_response: tresp.age_at_response,
            response: tresp.response,
            response_system: tresp.response_system}) ELSE [] END as treatment_response_filters
          with file, collect(DISTINCT {
                participant_id: p.participant_id,
                race: apoc.text.split(p.race, ';'),
                sex_at_birth: p.sex_at_birth,
                sample_diagnosis_genetic_analysis_filters: sample_diagnosis_genetic_analysis_filter,
                survival_filters: survival_filters,
                treatment_filters: treatment_filters,
                treatment_response_filters: treatment_response_filters
            }) as combined_filter_1
          MATCH (st:study)<--(file)
          OPTIONAL MATCH (st)<--(cl)<--(sm:sample)
          where (cl: cell_line or cl: pdx)
          OPTIONAL MATCH (sm)<--(dg:diagnosis)
          optional match (sm)<--(ga:genetic_analysis)
          with file, combined_filter_1, case when collect(sm) <> [] OR collect(dg) <> [] OR collect(ga) <> [] THEN COLLECT(DISTINCT {
                                        sample_anatomic_site: apoc.text.split(sm.anatomic_site, ';'),
                                        participant_age_at_collection: sm.participant_age_at_collection,
                                        sample_tumor_status: sm.sample_tumor_status,
                                        tumor_classification: sm.tumor_classification,
                                        age_at_diagnosis: dg.age_at_diagnosis,
                                        diagnosis_anatomic_site: apoc.text.split(dg.anatomic_site, ';'),
                                        disease_phase: dg.disease_phase,
                                        diagnosis_classification_system: dg.diagnosis_classification_system,
                                        diagnosis_basis: dg.diagnosis_basis,
                                        diagnosis: dg.diagnosis,
                                        diagnosis_category: apoc.text.split(dg.diagnosis_category, ';'),
                                        reported_significance: ga.reported_significance,
                                        reported_significance_system: ga.reported_significance_system,
                                        gene_symbol: case when ga is not null then apoc.coll.toSet(CASE
                                                WHEN ga.gene_symbol STARTS WITH '[' AND ga.gene_symbol ENDS WITH ']' THEN
                                                  [x IN split(replace(substring(ga.gene_symbol, 1, size(ga.gene_symbol)-2), "'", ""), ",") | 
                                                    CASE 
                                                      WHEN apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') = '' 
                                                      THEN 'Not Reported' 
                                                      ELSE apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') 
                                                    END
                                                  ]
                                                ELSE
                                                  [CASE 
                                                    WHEN apoc.text.replace(trim(ga.gene_symbol), '^[^A-Za-z0-9]+', '') = '' 
                                                    THEN 'Not Reported' 
                                                    ELSE apoc.text.replace(trim(ga.gene_symbol), '^[^A-Za-z0-9]+', '') 
                                                  END]
                                              END) else null end,
                                        alteration: ga.alteration,
                                        fusion_partner_gene: ga.fusion_partner_gene,
                                        alteration_type: ga.alteration_type,
                                        status: ga.status
                                    }) ELSE [] END as sample_diagnosis_genetic_analysis_filter
          with file, combined_filter_1, case when sample_diagnosis_genetic_analysis_filter <> [] THEN collect({
                participant_id: null,
                race: null,
                sex_at_birth: null,
                sample_diagnosis_genetic_analysis_filters: sample_diagnosis_genetic_analysis_filter,
                survival_filters: [],
                treatment_filters: [],
                treatment_response_filters: []
          }) ELSE [] END as combined_filter_2
          with file, apoc.coll.union(combined_filter_1, combined_filter_2) as combined_filter
          MATCH (st:study)<--(file)
          With file, st, combined_filter
          RETURN DISTINCT
            file.dcf_indexd_guid as id,
            file.dcf_indexd_guid AS file_id,
            [] as pid,
            null AS participant_id,
            null AS sample_id,
            st.study_id AS study_id,
            st.dbgap_accession as dbgap_accession,
            st.study_status AS study_status,
            st.study_acronym as study_acronym,
            st.study_name as study_name,
            file.dcf_indexd_guid AS guid,
            file.file_name AS file_name,
            file.file_access AS file_access,
            apoc.text.split(file.data_category, ';') as data_category,
            file.file_type AS file_type,
            file.file_mapping_level as file_mapping_level,
            file.file_description AS file_description,
            file.file_size AS file_size,
            file.md5sum AS md5sum,
            null AS library_selection,
            null AS library_source_material,
            null AS library_source_molecule,
            null AS library_strategy,
            [file.dcf_indexd_guid] as files,
            combined_filter as combined_filters
        page_size: 10

